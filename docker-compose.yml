version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: relieftrack-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: relieftrack
      POSTGRES_USER: relieftrack
      POSTGRES_PASSWORD: relieftrack123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
